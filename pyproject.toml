[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "support-agent-openenv"
version = "0.1.0"
description = "AI Agent environment for customer support automation"
authors = [{name = "Khushi Rai"}]
# Required dependency add kar di hai
dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
    "pyyaml",
    "requests",
    "openenv>=0.2.0" 
]

# Ye entry point unhe chahiye tha
[project.scripts]
server = "main:app"

[tool.setuptools]
packages = ["."]
