[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "support-agent-openenv"
version = "0.1.0"
description = "AI Agent environment for customer support automation"
authors = [
    {name = "Khushi Rai"}
]
dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
    "pyyaml",
    "requests"
]

[tool.setuptools]
packages = ["."]